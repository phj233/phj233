name: Update Contribution Stats

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次
  workflow_dispatch:  # 支持手动触发

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch Contribution Data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取用户的贡献数据
          CONTRIBUTIONS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/graphql" \
            -d '{"query":"query { user(login: \"phj233\") { contributionsCollection { totalCommitContributions totalIssueContributions totalPullRequestContributions totalPullRequestReviewContributions restrictedContributionsCount } } }"}')
          
          # 提取数据
          COMMITS=$(echo $CONTRIBUTIONS | jq -r '.data.user.contributionsCollection.totalCommitContributions')
          ISSUES=$(echo $CONTRIBUTIONS | jq -r '.data.user.contributionsCollection.totalIssueContributions')
          PRS=$(echo $CONTRIBUTIONS | jq -r '.data.user.contributionsCollection.totalPullRequestContributions')
          REVIEWS=$(echo $CONTRIBUTIONS | jq -r '.data.user.contributionsCollection.totalPullRequestReviewContributions')
          RESTRICTED=$(echo $CONTRIBUTIONS | jq -r '.data.user.contributionsCollection.restrictedContributionsCount')
          
          # 计算总数（包含私有贡献）
          TOTAL=$((COMMITS + ISSUES + PRS + REVIEWS))
          
          # 保存数据
          mkdir -p stats
          echo "{\"commits\":$COMMITS,\"issues\":$ISSUES,\"prs\":$PRS,\"reviews\":$REVIEWS,\"restricted\":$RESTRICTED,\"total\":$TOTAL,\"updated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > stats/data.json
      
      - name: Generate SVG
        run: |
          # 读取数据
          DATA=$(cat stats/data.json)
          COMMITS=$(echo $DATA | jq -r '.commits')
          ISSUES=$(echo $DATA | jq -r '.issues')
          PRS=$(echo $DATA | jq -r '.prs')
          REVIEWS=$(echo $DATA | jq -r '.reviews')
          TOTAL=$(echo $DATA | jq -r '.total')
          UPDATED=$(echo $DATA | jq -r '.updated')
          
          # 生成 SVG
          cat > stats/contributions.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
              </linearGradient>
            </defs>
            <rect width="400" height="200" fill="url(#bg)" rx="10"/>
            <text x="200" y="35" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#58A6FF" text-anchor="middle">GitHub Contributions</text>
            <text x="200" y="70" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">$TOTAL</text>
            <text x="200" y="90" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">Total Contributions (incl. private)</text>
            <line x1="50" y1="105" x2="350" y2="105" stroke="#30363D" stroke-width="1"/>
            <text x="70" y="130" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#8B949E">Commits</text>
            <text x="180" y="130" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#3FB950">$COMMITS</text>
            <text x="70" y="155" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#8B949E">Issues</text>
            <text x="180" y="155" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#3FB950">$ISSUES</text>
            <text x="70" y="180" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#8B949E">PRs</text>
            <text x="180" y="180" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#3FB950">$PRS</text>
            <text x="240" y="130" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#8B949E">Reviews</text>
            <text x="340" y="130" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#3FB950">$REVIEWS</text>
            <text x="240" y="155" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#484F58">Updated: $UPDATED</text>
          </svg
          EOF
          
          # 修复 SVG 结束标签
          sed -i 's/<\/svg$/<\/svg>/' stats/contributions.svg
      
      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin gh-pages || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          
          cp stats/contributions.svg .
          cp stats/data.json .
          
          git add contributions.svg data.json
          git diff --staged --quiet || git commit -m "Update contribution stats [skip ci]"
          git push origin gh-pages
